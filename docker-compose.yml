services:
  minlink:
    image: minlink:latest
    container_name: minlink
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_PATH=/app/data/minlink.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    ports:
      - "8082:8080"
    restart: unless-stopped