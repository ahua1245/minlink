services:
  minlink:
    build: .
    container_name: minlink
    environment:
      - APP_ENV=production
      - DB_PATH=/app/data/minlink.db
      - PORT=8080
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    networks:
      - minlink-network

networks:
  minlink-network:
    driver: bridge
